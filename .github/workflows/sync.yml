name: Auto Sync Fork

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync upstream
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: fork
        run: |
          git config --global user.name "infanx"
          git config --global user.email "infanx.chen@gmail.com"
          git remote add upstream https://github.com/jaywcjlove/reference.git
          git fetch upstream main
          git checkout main
          git merge upstream/main --allow-unrelated-histories -X theirs
          git push origin main
          
